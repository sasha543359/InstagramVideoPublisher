services:
  app:
    build: .
    restart: always
    volumes:
      - videos:/var/www/videos
    depends_on:
      - nginx

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
    volumes:
      - videos:/var/www/videos:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  videos:
